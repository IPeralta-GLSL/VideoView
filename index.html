<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Viewer</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Video Viewer</h1>
      <div class="header-actions">
        <button id="btn-toggle-view" class="btn-header">Toggle View</button>
        <button id="btn-render" class="btn-header primary">Render</button>
      </div>
    </header>
    <main class="main-workspace">
      <div class="preview-row">
      <div id="viewer-container" class="viewer-container">
        <div id="drop-overlay" class="drop-overlay">
          <div id="drop-left" class="drop-side"><span>Soltar Video 1</span></div>
          <div id="drop-right" class="drop-side"><span>Soltar Video 2</span></div>
        </div>
        <video id="video-base" class="video-element" playsinline preload="auto" crossorigin="anonymous">
          <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
            type="video/mp4">
        </video>
        <div id="video-overlay-container" class="video-overlay-container">
          <video id="video-overlay" class="video-element" playsinline preload="auto" crossorigin="anonymous">
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4"
              type="video/mp4">
          </video>
        </div>
        <div id="slider-handle" class="slider-handle">
          <div class="slider-handle-button">
            <div class="slider-line-icon"></div>
          </div>
        </div>
        <input type="range" id="comparison-slider" class="comparison-slider" min="0" max="100" value="50">
      </div>
      <div class="master-section">
        <div class="master-label">MASTER</div>
        <div class="master-controls">
          <canvas id="master-meter" class="master-meter-canvas"></canvas>
          <input type="range" id="master-fader" class="master-fader" min="-60" max="6" step="0.1" value="0">
        </div>
        <div class="master-db" id="master-db">0.0 dB</div>
      </div>
      </div>
      <div class="transport-controls">
        <div class="timecode">
          <span id="current-time">00:00:00:00</span>
        </div>
        <div class="controls-group">
          <button id="btn-start" class="btn-transport">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>
          <button id="btn-play-pause" class="btn-transport">
            <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </button>
        </div>
        <div class="timecode right">
          <span id="duration-time">00:00:00:00</span>
        </div>
      </div>
      <div class="bottom-panel">
        <div class="timeline-container">
          <canvas id="time-ruler" class="time-ruler"></canvas>
          <div class="tracks-wrapper">
            <div class="track">
              <canvas class="waveform-canvas" id="canvas-waveform-1"></canvas>
              <canvas id="buffer-bar-1" class="buffer-bar"></canvas>
            </div>
            <div class="track">
              <canvas class="waveform-canvas" id="canvas-waveform-2"></canvas>
              <canvas id="buffer-bar-2" class="buffer-bar"></canvas>
            </div>
          </div>
          <input type="range" id="timeline-slider" class="timeline-slider" min="0" max="100" value="0" step="0.01">
          <div class="playhead" id="playhead"></div>
        </div>
        <div class="track-headers">
          <div class="track-header">
            <div class="track-name" id="track1-name">BigBuckBunny.mp4</div>
            <input type="range" class="fader-horizontal" id="vol-track1" min="0" max="1" step="0.001" value="1">
          </div>
          <div class="track-header">
            <div class="track-name" id="track2-name">ElephantsDream.mp4</div>
            <input type="range" class="fader-horizontal" id="vol-track2" min="0" max="1" step="0.001" value="1">
          </div>
        </div>

      </div>
    </main>
  </div>
  <div id="render-settings-modal" class="modal-overlay">
    <div class="modal-content render-settings-content">
      <h2>Render Settings</h2>
      <div class="settings-grid">
        <label>Resolution</label>
        <select id="render-quality">
          <option value="2160">4K (2160p)</option>
          <option value="1080" selected>Full HD (1080p)</option>
          <option value="720">HD (720p)</option>
          <option value="480">SD (480p)</option>
        </select>
        <label>Codec</label>
        <select id="render-codec">
          <option value="vp9">VP9 &mdash; WebM</option>
          <option value="vp8">VP8 &mdash; WebM</option>
          <option value="h264">H.264 &mdash; MKV/WebM</option>
          <option value="av1">AV1 &mdash; WebM</option>
        </select>
        <label>Output format</label>
        <span id="render-format-display" class="hw-status" style="font-size:10px;color:#888">detecting...</span>
      </div>
      <p id="render-hw-status" class="hw-status"></p>
      <div class="modal-buttons">
        <button id="btn-render-cancel" class="btn-header">Cancel</button>
        <button id="btn-render-confirm" class="btn-header primary">Render</button>
      </div>
    </div>
  </div>
  <div id="render-modal" class="modal-overlay">
    <div class="modal-content">
      <h2>Rendering...</h2>
      <div class="progress-bar">
        <div id="render-progress" class="progress-fill"></div>
      </div>
      <p id="render-status">Preparing...</p>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
